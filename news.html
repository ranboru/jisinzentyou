<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>地震ニュース・ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
    <style>
:root { --accent: #ff4757; --bg: #f4f7f6; --text: #2f3542; }
body { font-family: 'BIZ UDPGothic', sans-serif; /* ここを修正！ */ background: var(--bg); color: var(--text); margin: 0; padding: 10px; } /* スマホ用にpaddingを少し小さく */

.container { 
    max-width: 800px; 
    margin: auto; 
    background: white; 
    padding: 20px; 
    border-radius: 10px; 
    box-sizing: border-box; /* 幅を計算しやすくするおまじない */
}

h1 { text-align: center; color: var(--accent); font-size: 1.5rem; } /* 少し小さめに */

.news-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
.article-view { display: none; }

.art-body h2 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
.art-body img { max-width: 100%; height: auto; border-radius: 8px; display: block; margin: 20px auto; }

button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 1rem; }

.red-text { color: #ff4757; font-weight: bold; }

/* ★ここからスマホ・PCの自動切り替え設定！★ */
@media screen and (max-width: 600px) {
    body { padding: 5px; }
    .container { padding: 10px; border-radius: 0; } /* スマホでは余白を詰める */
    h1 { font-size: 1.2rem; }
    button { width: 100%; margin-bottom: 10px; } /* スマホではボタンを横いっぱいに */
}
    </style>
</head>
<body>

<div class="container">
    <div id="list-view">
        <h1>地震ニュース一覧</h1>
        <div id="news-list"></div>
    </div>

    <div id="article-view" class="article-view">
        <button onclick="hideArticle()">← ニュース一覧に戻る</button>
        <h2 id="art-title"></h2>
        <p><small id="art-date"></small></p>
        <div id="art-body" class="art-body"></div>
    </div>
</div>

<script>
    /* 【記事の追加方法】
       以下の articles の中に、新しい数字（2, 3...）で追加していってね！
       
       ★使えるHTMLタグ例★
       ・文字を大きくする：<h1>大見出し</h1>, <h2>中見出し</h2>
       ・太文字にする：<strong>強調したい文字</strong>
       ・改行：<br>
       ・画像を入れる：<img src="画像のURL">
    */
    const articles = {
        1: {
            title: "7月1日時点での緊急地震速報発表状況",
            date: "2026/07/01",
            body: `
            <p>今日の地震ニュース</p>
            <p>７月１日時点で緊急地震速報（警報）の発表回数が前年を上回る１７回となりました。（下記の図を参照）</p>
                <img src="https://pbs.twimg.com/media/HMGY6z5aAAAVC23?format=jpg&name=900x900">
                <p>今年の緊急地震速報が発表された地震の概要を振り返ってみましょう。</p>
                <br>
                <br>
                <br>
                １回目<br><strong>2026/01/06 10:18	島根県東部	M6.4	震度<span class="red-text">５強</span></strong><br><br>
                ２回目<br><strong>2026/01/06 10:28	島根県東部	M5.1	震度<span class="red-text">５弱</span></strong><br><br>
                ３回目<br><strong>2026/01/06 10:37	島根県東部	M5.5	震度４</strong><br><br>
                ４回目<br><strong>2026/01/06 10:37	島根県東部	M5.5	震度４</strong><br><br>
                ５回目<br><strong>2026/01/11 13:15	岩手県沿岸北部	M5.1	震度４</strong><br><br>
                ６回目<br><strong>2026/04/01 10:06	茨城県南部	M5.0	震度<span class="red-text">５弱</span></strong><br><br>
                ７回目<br><strong>2026/04/18 13:20	長野県北部	M5.0	震度<span class="red-text">５強</span></strong><br><br>
                ８回目<br><strong>2026/04/18 14:54	長野県北部	M5.1	震度<span class="red-text">５弱</span></strong><br><br>
                ９回目<br><strong>2026/04/20 16:52	三陸沖	M7.7	震度<span class="red-text">５強</span></strong><br><br>
                １０回目<br><strong>2026/04/27 05:23	十勝地方南部	M6.2	震度<span class="red-text">５強</span></strong><br><br>
                １１回目<br><strong>2026/05/02 18:28	和歌山県南部	M5.8	震度４</strong><br><br>
                １２回目<br><strong>2026/05/15 20:22	宮城県沖	M6.4	震度<span class="red-text">５弱</span></strong><br><br>
                １３回目<br><strong>2026/05/20 11:46	沖縄本島近海	M5.9	震度<span class="red-text">５強</span></strong><br><br>
                １４回目<br><strong>2026/06/16 19:46	茨城県南部	M5.5	震度<span class="red-text">５弱</span></strong><br><br>
                １５回目<br><strong>2026/06/25 07:30	岩手県沖	M7.2	震度<span class="red-text">６強</span></strong><br><br>
                １６回目<br><strong>2026/06/26 22:28	山梨県東部・富士五湖	M5.6	震度<span class="red-text">６弱</span></strong><br><br>
                １７回目<br><strong>2026/07/01 08:40	宮崎県北部平野部	M5.1	震度４</strong><br><br>
                <p>このように震度５弱以上に満たない地震もありますが５弱以上の地震が圧倒的に多いことがわかります。<p>
                    <p>また岩手県沖の６強は、観測史上初。日本全体で見ても2025/12/08 23:15	青森県東方沖	M7.5	以来となります。</p>
                    <p>今後も同程度の地震・あるいはそれ以上の地震が起こる可能性がありますので、イオノグラムや電離圏などの地震予兆に注目しましょう。		
            `
        }
        // ここに 2: { title: "...", date: "...", body: "..." }, みたいに増やしてね！
    };

    // 一覧を表示する処理
    const listDiv = document.getElementById('news-list');
    for (let id in articles) {
        listDiv.innerHTML += `
            <div class="news-item" onclick="showArticle(${id})">
                <h3>【${articles[id].date}】${articles[id].title}</h3>
            </div>
        `;
    }

    function showArticle(id) {
        const art = articles[id];
        document.getElementById('art-title').innerText = art.title;
        document.getElementById('art-date').innerText = art.date;
        document.getElementById('art-body').innerHTML = art.body; // HTMLタグが有効になるよ！
        
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('article-view').style.display = 'block';
    }

    function hideArticle() {
        document.getElementById('list-view').style.display = 'block';
        document.getElementById('article-view').style.display = 'none';
    }
</script>

</body>
</html>
